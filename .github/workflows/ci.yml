name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: forge build --sizes

      - name: Check contract sizes
        run: forge build --sizes 2>&1 | awk '/Contract/ { if ($NF+0 > 24576) { print "OVERSIZED: " $0; exit 1 } }'

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run unit and integration tests
        run: forge test -vvv --match-path "test/unit/**" --match-path "test/integration/**"

      - name: Run fuzz tests
        run: forge test -vvv --match-path "test/fuzz/**"

      - name: Run invariant tests
        run: forge test -vvv --match-path "test/invariant/**"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Generate coverage report
        run: forge coverage --report lcov

      - name: Check coverage threshold (80%)
        run: |
          LINES=$(lcov --summary lcov.info 2>&1 | grep "lines" | awk '{print $2}' | tr -d '%')
          echo "Line coverage: ${LINES}%"
          if (( $(echo "$LINES < 80" | bc -l) )); then
            echo "Coverage ${LINES}% is below the 80% threshold"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check formatting
        run: forge fmt --check

  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          node-version: 20
          slither-args: "--exclude-dependencies --filter-paths lib/"
          fail-on: high

  deploy-sepolia:
    name: Deploy to Base Sepolia
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: base-sepolia
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Deploy contracts
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
          VRF_SUBSCRIPTION_ID: ${{ secrets.VRF_SUBSCRIPTION_ID }}
          VRF_KEY_HASH: ${{ secrets.VRF_KEY_HASH }}
          VRF_COORDINATOR: ${{ secrets.VRF_COORDINATOR }}
        run: |
          forge script script/Deploy.s.sol:DeployScript \
            --rpc-url $BASE_SEPOLIA_RPC_URL \
            --broadcast \
            --verify \
            --etherscan-api-key $BASESCAN_API_KEY \
            -vvvv

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployments-base-sepolia
          path: deployments/base-sepolia.json
